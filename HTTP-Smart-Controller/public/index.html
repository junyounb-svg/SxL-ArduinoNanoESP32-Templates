<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Driving Controller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            padding: 16px;
            padding-bottom: env(safe-area-inset-bottom);
        }
        h1 {
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #e94560;
        }
        .section {
            background: rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .section h2 {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        /* Steering wheel container */
        .steering-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            touch-action: none;
        }
        .steering-wheel {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2d2d2d 0%, #1a1a1a 100%);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.5), 0 6px 20px rgba(0,0,0,0.4);
            border: 12px solid #333;
            position: relative;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }
        .steering-wheel:active { cursor: grabbing; }
        .steering-wheel-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transform-origin: center center;
        }
        .steering-wheel-dot {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #e94560;
            top: 4px;
            left: 50%;
            margin-left: -12px;
            box-shadow: 0 0 12px rgba(233,69,96,0.6);
            pointer-events: none;
        }
        .pedals {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 12px;
        }
        .pedal {
            flex: 1;
            max-width: 160px;
            height: 120px;
            border: none;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.05s, box-shadow 0.05s;
        }
        .pedal:active { transform: scale(0.96); }
        #gasBtn {
            background: linear-gradient(180deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            box-shadow: 0 6px 0 #1e8449;
        }
        #gasBtn:active { box-shadow: 0 2px 0 #1e8449; }
        #brakeBtn {
            background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            box-shadow: 0 6px 0 #922b21;
        }
        #brakeBtn:active { box-shadow: 0 2px 0 #922b21; }
        .settings input {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #222;
            color: #eee;
            font-size: 1rem;
        }
        .settings button {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        .status {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
        }
        .status.ok { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .status.err { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
    </style>
</head>
<body>
    <h1>Driving Controller</h1>

    <div class="section">
        <h2>Steering</h2>
        <div class="steering-wrap">
            <div class="steering-wheel" id="steeringWheel">
                <div class="steering-wheel-inner" id="steeringInner">
                    <div class="steering-wheel-dot"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>Gas & Brake</h2>
        <div class="pedals">
            <button type="button" id="gasBtn" class="pedal">GAS</button>
            <button type="button" id="brakeBtn" class="pedal">BRAKE</button>
        </div>
    </div>

    <div class="section settings">
        <h2>Unity Server</h2>
        <input type="text" id="unityHost" placeholder="e.g. 192.168.1.105 or localhost">
        <input type="number" id="unityPort" placeholder="4000" value="4000">
        <button type="button" onclick="saveSettings()">Save</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        var UNITY_HOST_KEY = 'unityHost';
        var PORT_KEY = 'unityPort';

        var unityHost = localStorage.getItem(UNITY_HOST_KEY) || window.location.hostname || 'localhost';
        var unityPort = parseInt(localStorage.getItem(PORT_KEY) || '4000', 10);

        document.getElementById('unityHost').value = unityHost;
        document.getElementById('unityPort').value = unityPort;

        function saveSettings() {
            unityHost = document.getElementById('unityHost').value.trim() || 'localhost';
            unityPort = parseInt(document.getElementById('unityPort').value || '4000', 10);
            localStorage.setItem(UNITY_HOST_KEY, unityHost);
            localStorage.setItem(PORT_KEY, String(unityPort));
            showStatus('Settings saved. Unity: ' + unityHost + ':' + unityPort, true);
        }

        function showStatus(msg, ok) {
            var el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + (ok ? 'ok' : 'err');
        }

        var currentSpeed = 0;
        var currentSteer = 0;

        function sendToUnity() {
            var url = 'http://' + unityHost + ':' + unityPort + '/?speed=' + currentSpeed + '&steer=' + currentSteer;
            fetch(url, { method: 'GET', mode: 'cors' })
                .then(function(res) { return res.text(); })
                .then(function() { showStatus('OK', true); })
                .catch(function() { showStatus('Unity not reachable', false); });
        }

        // Steering wheel: drag left/right, max rotation ~150deg each way -> steer -1 to 1
        var steeringEl = document.getElementById('steeringWheel');
        var innerEl = document.getElementById('steeringInner');
        var maxRot = 150;
        var startX = 0, startRot = 0, currentRot = 0;

        function setSteer(value) {
            currentSteer = Math.max(-1, Math.min(1, value));
            innerEl.style.transform = 'rotate(' + (currentSteer * maxRot) + 'deg)';
            sendToUnity();
        }

        function getCenter(el) {
            var r = el.getBoundingClientRect();
            return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
        }

        function onPointerDown(e) {
            e.preventDefault();
            var t = (e.touches && e.touches[0]) || e;
            startX = t.clientX;
            startRot = currentSteer * maxRot;
        }

        function onPointerMove(e) {
            e.preventDefault();
            var t = (e.touches && e.touches[0]) || e;
            var dx = t.clientX - startX;
            var newRot = startRot + dx * 0.8;
            newRot = Math.max(-maxRot, Math.min(maxRot, newRot));
            currentRot = newRot;
            setSteer(newRot / maxRot);
            startX = t.clientX;
            startRot = newRot;
        }

        function onPointerUp(e) {
            e.preventDefault();
            document.removeEventListener('mousemove', onPointerMove);
            document.removeEventListener('mouseup', onPointerUp);
            document.removeEventListener('touchmove', onPointerMove, { passive: false });
            document.removeEventListener('touchend', onPointerUp);
            setSteer(0);
            innerEl.style.transform = 'rotate(0deg)';
        }

        steeringEl.addEventListener('mousedown', function(e) {
            onPointerDown(e);
            document.addEventListener('mousemove', onPointerMove);
            document.addEventListener('mouseup', onPointerUp);
        });
        steeringEl.addEventListener('touchstart', function(e) {
            onPointerDown(e);
            document.addEventListener('touchmove', onPointerMove, { passive: false });
            document.addEventListener('touchend', onPointerUp);
        });

        var gasBtn = document.getElementById('gasBtn');
        var brakeBtn = document.getElementById('brakeBtn');
        gasBtn.addEventListener('touchstart', function(e) { e.preventDefault(); currentSpeed = -1; sendToUnity(); });
        gasBtn.addEventListener('touchend', function(e) { e.preventDefault(); currentSpeed = 0; sendToUnity(); });
        gasBtn.addEventListener('mousedown', function() { currentSpeed = -1; sendToUnity(); });
        gasBtn.addEventListener('mouseup', function() { currentSpeed = 0; sendToUnity(); });
        gasBtn.addEventListener('mouseleave', function() { currentSpeed = 0; sendToUnity(); });

        brakeBtn.addEventListener('touchstart', function(e) { e.preventDefault(); currentSpeed = 1; sendToUnity(); });
        brakeBtn.addEventListener('touchend', function(e) { e.preventDefault(); currentSpeed = 0; sendToUnity(); });
        brakeBtn.addEventListener('mousedown', function() { currentSpeed = 1; sendToUnity(); });
        brakeBtn.addEventListener('mouseup', function() { currentSpeed = 0; sendToUnity(); });
        brakeBtn.addEventListener('mouseleave', function() { currentSpeed = 0; sendToUnity(); });

        setInterval(sendToUnity, 100);
    </script>
</body>
</html>
