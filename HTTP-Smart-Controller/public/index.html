<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Button Controller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .button-container {
            margin: 40px 0;
        }

        #colorButton {
            padding: 30px 60px;
            font-size: 1.5em;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #colorButton:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        #colorButton:active {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .info {
            margin-top: 30px;
            font-size: 1.2em;
            color: #666;
        }

        .click-count {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .color-display {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            color: #333;
        }

        .unity-status {
            margin-top: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
        }

        .unity-connected {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .unity-disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .settings {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .settings h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.2em;
        }

        .settings input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .settings button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        .settings button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Smart Button Controller</h1>
        
        <div class="button-container">
            <button id="colorButton">Click Me!</button>
        </div>

        <div class="click-count">
            Clicks: <span id="clickCount">0</span>
        </div>

        <div class="color-display">
            Current Color: <span id="currentColor">#3498db</span>
        </div>

        <div id="unityStatus" class="unity-status unity-disconnected">
            Unity: Disconnected
        </div>

        <div class="info">
            Click the button to change its color and send to Unity!
        </div>

        <div class="settings">
            <h3>Unity Server Settings</h3>
            <input type="text" id="unityHost" placeholder="Unity Host (e.g., localhost or 192.168.1.100)" value="localhost">
            <input type="number" id="unityPort" placeholder="Unity Port (e.g., 4000)" value="4000">
            <button onclick="updateUnitySettings()">Update Settings</button>
        </div>
    </div>

    <script>
        const colors = [
            '#3498db',
            '#e74c3c',
            '#2ecc71',
            '#f39c12',
            '#9b59b6',
            '#1abc9c',
            '#e67e22',
            '#34495e',
            '#16a085',
            '#c0392b'
        ];

        let currentColorIndex = 0;
        let clickCount = 0;

        const button = document.getElementById('colorButton');
        const clickCountDisplay = document.getElementById('clickCount');
        const currentColorDisplay = document.getElementById('currentColor');
        const unityStatusDisplay = document.getElementById('unityStatus');

        let unityHost = 'localhost';
        let unityPort = 4000;

        async function checkUnityStatus() {
            try {
                const response = await fetch('/api/unity/status');
                const data = await response.json();
                updateUnityStatusDisplay(data.connected);
            } catch (error) {
                console.error('Error checking Unity status:', error);
                updateUnityStatusDisplay(false);
            }
        }

        function updateUnityStatusDisplay(connected) {
            if (connected) {
                unityStatusDisplay.textContent = `Unity: Connected (${unityHost}:${unityPort})`;
                unityStatusDisplay.className = 'unity-status unity-connected';
            } else {
                unityStatusDisplay.textContent = `Unity: Disconnected`;
                unityStatusDisplay.className = 'unity-status unity-disconnected';
            }
        }

        function updateUnitySettings() {
            const hostInput = document.getElementById('unityHost');
            const portInput = document.getElementById('unityPort');
            unityHost = hostInput.value || 'localhost';
            unityPort = portInput.value || 4000;
            console.log(`Unity settings updated: ${unityHost}:${unityPort}`);
            alert(`Unity settings updated to ${unityHost}:${unityPort}\nNote: You may need to restart the Node.js server for changes to take effect.`);
        }

        async function loadState() {
            try {
                const response = await fetch('/api/state');
                const state = await response.json();
                clickCount = state.clickCount;
                clickCountDisplay.textContent = clickCount;
                currentColorDisplay.textContent = state.color;
                button.style.backgroundColor = state.color;
                currentColorIndex = colors.indexOf(state.color);
                if (currentColorIndex === -1) currentColorIndex = 0;
            } catch (error) {
                console.error('Error loading state:', error);
            }
        }

        button.addEventListener('click', async () => {
            currentColorIndex = (currentColorIndex + 1) % colors.length;
            const newColor = colors[currentColorIndex];
            
            button.style.backgroundColor = newColor;
            currentColorDisplay.textContent = newColor;
            
            try {
                const response = await fetch('/api/click', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ color: newColor })
                });
                
                const state = await response.json();
                clickCount = state.clickCount;
                clickCountDisplay.textContent = clickCount;
                
                checkUnityStatus();
            } catch (error) {
                console.error('Error updating state:', error);
            }
        });

        loadState();
        checkUnityStatus();
        setInterval(checkUnityStatus, 3000);
    </script>
</body>
</html>
